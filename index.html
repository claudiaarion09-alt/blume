sium and heat relax the muscle; omega-3s calm the inflammation behind them.`,tips:[`Heat on your lower belly for 15–20 min — a heat pad rivals ibuprofen in studies`,`Magnesium glycinate in the evening (found in pumpkin seeds, dark chocolate, spinach)`,`Omega-3s: salmon, walnuts, chia — they lower prostaglandins over time`,`Gentle movement — a slow walk or child’s pose eases the spasm`]}},{id:`bloating`,label:`Bloating`,icon:`CircleDashed`,category:`body`,advice:{title:`Bloating is water, not weight`,why:`Shifting estrogen and progesterone make you hold onto water and slow digestion. It passes — it isn’t fat gain.`,tips:[`Potassium flushes water: banana, cucumber, avocado, sweet potato`,`Ginger or peppermint tea to move things along`,`Ease off salt and fizzy drinks for a day or two`,`A 10-minute walk after meals genuinely helps digestion`]}},{id:`headache`,label:`Headache`,icon:`Zap`,category:`body`,advice:{title:`Hormone-drop headaches are real`,why:`The estrogen dip right before your period can trigger headaches, often with dehydration compounding it.`,tips:[`Water first — even mild dehydration triggers these`,`Magnesium can prevent hormonal headaches when taken regularly`,`Steady blood sugar: don’t skip meals this week`,`Caffeine in small amounts can help, but too much rebounds`]}},{id:`tender`,label:`Tender breasts`,icon:`Heart`,category:`body`,advice:{title:`Tenderness tracks your hormones`,why:`Progesterone rises in the luteal phase and can make breast tissue swell and feel sore. It settles once your period starts.`,tips:[`A supportive, softer bra for a few days`,`Lower caffeine — it can worsen tenderness for many people`,`Evening primrose oil helps some; give it a couple of cycles`,`Warm compress if it feels tight`]}},{id:`acne`,label:`Breakouts`,icon:`Sparkle`,category:`body`,advice:{title:`Hormonal skin is not a hygiene problem`,why:`Before your period, androgens rise relative to estrogen and oil glands ramp up — especially around the chin and jaw. Common wi ls`,`A brisk walk burns off the edge and lifts serotonin`,`Give yourself permission to need more space today`]}},{id:`low`,label:`Low mood`,icon:`CloudDrizzle`,category:`mood`,advice:{title:`Heaviness before your period`,why:`The premenstrual serotonin dip can bring a low, flat feeling. It usually lifts within a day or two of bleeding starting.`,tips:[`Sunlight or a bright walk first thing helps serotonin`,`Omega-3s and vitamin D support mood over time`,`Lower the bar today — rest is not falling behind`,`If lowness lasts most days every month, it’s worth mentioning to a doctor (PMDD is real and treatable)`]}},{id:`weepy`,label:`Weepy`,icon:`Droplet`,category:`mood`,advice:{title:`Tears close to the surface`,why:`Hormone shifts make emotions feel bigger and closer. Crying easily this week doesn’t mean something’s wrong.`,tips:[`Let it out — a good cry actually relieves tension`,`Comfort without guilt: warmth, a favorite show, someone kind`,`Notice if it clusters premenstrually — that’s useful information`]}},{id:`calm`,label:`Calm`,icon:`Leaf`,category:`mood`,advice:{title:`A settled, steady day`,why:`Rising estrogen in the follicular phase often brings calm focus and optimism. Lovely to notice and remember.`,tips:[`A good day to plan, decide, or start something`,`Notice what calm feels like so you can recognize it returning`]}},{id:`confident`,label:`Confident`,icon:`Star`,category:`mood`,advice:{title:`Feeling bright`,why:`Around ovulation, estrogen and testosterone peak — many feel most confident, social, and articulate now.`,tips:[`Great timing for conversations you’ve been putting off`,`Ride it — this is your natural high point`]}},{id:`exhausted`,label:`Exhausted`,icon:`BatteryLow`,category:`energy`,advice:{title:`You’re tired today — that’s your body, not laziness`,why:`Energy dips in the late luteal and menstrual phases as hormones fall and (if bleeding) iron drops. Rest is the correct response.`,tips:[`Iron-rich foods: lentils, red meat, spinach — pair with part, mention it to a doctor so they can take a supportive look.`},{id:`short-cycle`,keywords:[`short cycle`,`twice a month`,`too often`,`frequent`,`21 days`,`close together`,`every two weeks`],answer:`Cycles on the shorter side — around 21–24 days — can be normal for you, and they're also common in the years after periods first start. What looks like 'twice a month' is often just a short cycle plus some ovulation spotting. If periods come closer than ~21 days apart regularly, or you're soaking through protection, it's worth checking in with a doctor.`},{id:`irregular`,keywords:[`irregular`,`unpredictable`,`different lengths`,`all over the place`,`never regular`,`varies`,`not consistent`],answer:`Irregular cycles are incredibly common — especially in the first few years of periods and with PCOS — and Blume is built exactly for them. 'Regular' is a range, not a single number, and yours might just be a wider range. Tracking (like you're doing) is the best thing you can do: it turns 'random' into a pattern you and a doctor can actually read.`},{id:`spotting`,keywords:[`spotting`,`brown`,`bleeding between`,`mid cycle`,`midcycle`,`light bleeding`,`pink discharge`,`blood between`],answer:`Light spotting between periods is usually harmless. Brown spotting is often just old blood at the start or end of a period. A little pink or clear-streaked spotting around the middle of your cycle can even be ovulation. It's worth mentioning to a doctor if spotting is frequent, heavy, happens after sex, or comes with pain — mostly so they can reassure you.`},{id:`cramps`,keywords:[`cramp`,`painful period`,`hurts`,`period pain`,`lower belly`,`back pain`],answer:`Cramps come from your uterus contracting, driven by natural chemicals called prostaglandins. Manageable cramps are normal. Heat on your belly, gentle movement, magnesium and anti-inflammatories genuinely help. But pain that stops you doing normal things, doesn't ease with painkillers, or is getting worse over time deserves a doctor's attention — that level of pain isn't something you just have to endure.`},{id:`cravings`,keywords:[`craving`,`chocolate`,`sweet`,`hungry`,`eating more`,`appetite`,`binge`],answer:`Cravings and extra hunger before your period are real chemistry, not a lack of willpower. Your metabolism actually rises a little in the luteal phase, and a dip in serotonin makes your brain reach for carbs and chocolate (often a magnesium nudge). Eat enough, lean on protein and complex carbs to stay steady, and enjoy the good dark chocolate guilt-free.`},{id:`acne`,keywords:[`acne`,`breakout`,`pimple`,`skin`,`spots on face`,`chin`],answer:`Hormonal breakouts — often around the chin and jaw, in the days before your period — are extremely common and not about hygiene. They're driven by the shift in hormones (and are common with PCOS). Gentle skincare, not harsh scrubbing, plus zinc-rich foods can help. If breakouts are severe or persistent, a doctor or dermatologist has genuinely effective options.`},{id:`mood`,keywords:[`mood`,`emotional`,`cry`,`angry`,`irritable`,`sad`,`anxious`,`pms`,`depressed before`,`mood swings`],answer:`Big feelings before your period are hormonal, not a flaw in you. As estrogen and progesterone fall, so does serotonin — which genuinely affects mood, sleep and patience. It usually lifts within a day or two of bleeding starting. Be as kind to yourself as you'd be to a friend. If low mood is severe most months, ask a doctor about PMDD — it's real, common, and very treatable.`},{id:`heavy`,keywords:[`heavy`,`clots`,`flooding`,`soaking`,`bleeding a lot`,`changing pad every hour`,`gushing`],answer:`Flow varies a lot from person to person and month to month, and some clots are normal. But bleeding is worth a doctor's look if you're soaking through a pad or tampon every hour for several hours, passing clots bigger than a coin, or feeling dizzy and exhausted — that can affect your iron. You deserve to have that checked and supported, not to just push through.`},{id:`pcos`,keywords:[`pcos`,`polycystic`,`ovary`,`ovaries`,`cysts`,`insulin`,`facial hair`,`hirsutism`],answer:`PCOS is common and manageable, and irregular cycles are one of its main features — because ovulation doesn't happen on a predictable schedule. It's nothing you caused. Tracking your cycles, symptoms and patterns (Blume's Doctor Mode can package this up) is genuinely valuable to bring to an appointment. A doctor can talk through options that fit your goals, whether that's cycle regularity, skin, or fertility.`},{id:`pregnancy`,keywords:[`pregnant`,`ovulating`,`fertile`,`conceive`,`trying`,`ttc`,`when do i ovulate`,`best time`,`baby`],answer:`Ovulation usually happens about 14 days before your next period, and your most fertile days are roughly the 5 days leading up to it plus ovulation day. With irregular cycles this window is harder to pin down — which is exactly why Blume shows it as an estimate, not a guarantee. Please don't use predictions as birth control. If you're trying to conceive and cycles are very irregular, a doctor can help you time and understand things.`},{id:`first-period`,keywords:[`first period`,`just started`,`teenager`,`young`,`menarche`,`12`,`13`,`14`,`new to periods`],answer:`If your periods started recently, irregular is completely expected — often for the first 2–3 years while your body finds its rhythm. Skipped months, cycles that vary a lot, and unpredictable timing are all normal in this stage, not signs something's wrong. Tracking now helps you get to know your own patterns as they settle.`},{id:`discharge`,keywords:[`discharge`,`cervical mucus`,`white discharge`,`clear discharge`,`egg white`,`wetness`],answer:`Discharge is information, not something to be embarrassed about. It naturally changes across your cycle — drier after your period, creamier as you approach ovulation, then clear and stretchy (like egg white) around your fertile window, when estrogen peaks. Worth a doctor's look only if it's green, grey, very smelly, or comes with itching or soreness, which can signal an easily-treated infection.`},{id:`doctor`,keywords:[`see a doctor`,`should i worry`,`worried`,`concerned`,`is it serious`,`when to see`,`gyno`,`gynecologist`,`normal`],answer:`Trust your gut: if something feels off, it's always okay to check with a doctor — that's what they're there for, and asking is never an overreaction. Gentle flags worth raising: no period for 3+ months (and not pregnant), cycles regularly under 21 or over 45 days, bleeding so heavy you soak a pad hourly, severe pain that stops your day, or bleeding after sex. Blume's Doctor Mode turns your history into a clean summary you can bring along.`}],Zp=`Just so you know, I'm a gentle guide, not a doctor — this isn't medical advice. For anything that worries you, please check with a healthcare professional. 💛`;function Qp(e){let t=` ${e.toLowerCase().replace(/[^\w\s']/g,` `)} `,n=null,r=0;for(let e of Xp){let i=0;for(let n of e.keywords)(t.includes(` ${n} `)||t.includes(n))&&(i+=n.includes(` `)?3:1);i>r&&(r=i,n=e)}return n&&r>0?{answer:`${n.answer}\n\n${Zp}`,matchedId:n.id}:{answer:`I don't have a specific answer for that one — but here's what's generally reassuring: bodies, especially cycles that run irregularly, vary a lot, and 'different' very often just means different, not wrong. Tracking what you notice is the best way to understand your own normal. And it's always, always okay to check with a doctor about anything on your mind.
