<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#fff4f7"/>
      <stop offset="55%" stop-color="#fde6ee"/>
      <stop offset="100%" stop-color="#f6d7e6"/>
    </radialGradient>
    <linearGradient id="petal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7c2ce"/>
      <stop offset="100%" stop-color="#ec859e"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d3c6ee"/>
      <stop offset="100%" stop-color="#a488d4"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <g transform="translate(256 262)">
    <g>
      <!-- 5 petals -->
      <g fill="url(#petal)">
        <ellipse cx="0" cy="-96" rx="42" ry="70"/>
        <ellipse cx="91" cy="-30" rx="42" ry="70" transform="rotate(72 91 -30)"/>
        <ellipse cx="56" cy="78" rx="42" ry="70" transform="rotate(144 56 78)"/>
        <ellipse cx="-56" cy="78" rx="42" ry="70" transform="rotate(216 -56 78)"/>
        <ellipse cx="-91" cy="-30" rx="42" ry="70" transform="rotate(288 -91 -30)"/>
      </g>
      <!-- inner petals -->
      <g fill="url(#petal2)" opacity="0.55">
        <ellipse cx="0" cy="-52" rx="24" ry="40"/>
        <ellipse cx="49" cy="-16" rx="24" ry="40" transform="rotate(72 49 -16)"/>
        <ellipse cx="30" cy="42" rx="24" ry="40" transform="rotate(144 30 42)"/>
        <ellipse cx="-30" cy="42" rx="24" ry="40" transform="rotate(216 -30 42)"/>
        <ellipse cx="-49" cy="-16" rx="24" ry="40" transform="rotate(288 -49 -16)"/>
      </g>
      <circle cx="0" cy="0" r="34" fill="#f9dfa0"/>
      <circle cx="0" cy="0" r="34" fill="#f3c86f" opacity="0.5"/>
    </g>
  </g>
</svg>
